name: Update profile art

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.32.3 beautifulsoup4==4.12.3

      - name: Fetch contribution data
        env:
          GITHUB_PROFILE_USERNAME: arnavprabhu
        run: python scripts/fetch_contributions.py

      - name: Render contribution heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Rebuild info card
        env:
          GITHUB_PROFILE_USERNAME: arnavprabhu
        run: python scripts/make_info_card.py

      - name: Commit refreshed assets
        uses: stefanzweifel/git-auto-commit-action@b863ae1933cb653a53c021fe36dbb774e1fb9403 # v5
        with:
          commit_message: "chore: refresh profile art [skip ci]"
          file_pattern: "data/contributions.json contribution-heatmap.svg info-card.svg"
